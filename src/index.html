<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmonyakAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0c0c;
    --surface: #131313;
    --border: #222;
    --accent: #e8ff00;
    --text: #d4d4d4;
    --muted: #3a3a3a;
    --dim: #555;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  #titlebar {
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    -webkit-app-region: drag;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }

  .title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .wcontrols {
    display: flex;
    gap: 6px;
    -webkit-app-region: no-drag;
  }

  .wcontrols button {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.1s;
  }
  .wcontrols button:hover { opacity: 1; }
  #btn-close { background: #ff5f57; }
  #btn-min   { background: #febc2e; }
  #btn-max   { background: #28c840; }

  #app {
    height: calc(100vh - 38px);
    display: flex;
    flex-direction: column;
  }

  #download-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 60px 40px;
  }

  .dl-logo {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .dl-logo span { color: var(--accent); }

  .dl-tagline {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: -28px;
  }

  .dl-box {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .track {
    width: 100%;
    height: 1px;
    background: var(--border);
    position: relative;
  }

  .fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--accent);
  }

  .dl-meta {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  #download-btn {
    align-self: flex-start;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 9px 22px;
    cursor: pointer;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }

  #download-btn:hover { background: var(--accent); color: #000; }
  #download-btn:disabled { opacity: 0.25; cursor: default; background: none; color: var(--accent); }

  #dl-status {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.08em;
  }

  #chat-screen {
    flex: 1;
    display: none;
    flex-direction: column;
  }

  #bg-bar {
    height: 1px;
    background: var(--border);
    flex-shrink: 0;
    display: none;
  }

  #bg-fill {
    height: 100%;
    background: var(--accent);
    opacity: 0.35;
    width: 0%;
    transition: width 0.4s ease;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    padding: 18px 28px;
    font-size: 12px;
    line-height: 1.75;
    border-bottom: 1px solid var(--border);
  }

  .msg.user { background: #101010; }
  .msg.ai   { background: var(--bg); }

  .msg-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 7px;
    color: var(--muted);
  }

  .msg.user .msg-label { color: var(--accent); }

  #input-row {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    resize: none;
    padding: 16px 20px;
    max-height: 120px;
    min-height: 20px;
  }

  #input::placeholder { color: var(--muted); }

  #send-btn {
    background: none;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 0 20px;
    cursor: pointer;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  #send-btn:hover { color: var(--accent); background: #111; }
  #send-btn:disabled { opacity: 0.2; cursor: default; }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--accent);
    animation: blink 0.9s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="titlebar">
  <span class="title">Amonyak<span style="color:var(--accent)">AI</span></span>
  <div class="wcontrols">
    <button id="btn-min"></button>
    <button id="btn-max"></button>
    <button id="btn-close"></button>
  </div>
</div>

<div id="app">
  <div id="download-screen">
    <div>
      <div class="dl-logo">Amonyak<span>AI</span></div>
      <div class="dl-tagline">model gerekli</div>
    </div>

    <div class="dl-box">
      <div class="track"><div class="fill" id="progress-bar"></div></div>
      <div class="dl-meta">
        <span id="progress-text">0 MB / 4661 MB</span>
        <span id="progress-pct">0%</span>
      </div>
      <button id="download-btn">İndir</button>
      <div id="dl-status">—</div>
    </div>
  </div>

  <div id="chat-screen">
    <div id="bg-bar"><div id="bg-fill"></div></div>
    <div id="messages"></div>
    <div id="input-row">
      <textarea id="input" placeholder="yaz..." rows="1"></textarea>
      <button id="send-btn">Gönder</button>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
