<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmonyakAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #c8ff00;
    --text: #e8e8e8;
    --muted: #444;
    --user-bg: #161616;
    --ai-bg: #0f0f0f;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  #titlebar {
    height: 36px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    -webkit-app-region: drag;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #titlebar .title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  #titlebar .controls {
    display: flex;
    gap: 8px;
    -webkit-app-region: no-drag;
  }

  #titlebar .controls button {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  #titlebar .controls button:hover { opacity: 0.7; }
  #btn-close { background: #ff5f57; }
  #btn-min { background: #febc2e; }
  #btn-max { background: #28c840; }

  #app {
    height: calc(100vh - 36px);
    display: flex;
    flex-direction: column;
  }

  #download-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 48px;
  }

  #download-screen .logo {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  #download-screen .sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #progress-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #progress-bar-bg {
    width: 100%;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 12px var(--accent);
  }

  #progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  #download-btn {
    padding: 10px 28px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
  }

  #download-btn:hover { opacity: 0.85; }
  #download-btn:disabled { opacity: 0.3; cursor: default; }

  #download-status {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  #chat-screen {
    flex: 1;
    display: none;
    flex-direction: column;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    padding: 16px 32px;
    font-size: 13px;
    line-height: 1.7;
    border-bottom: 1px solid var(--border);
  }

  .msg.user {
    background: var(--user-bg);
    color: var(--text);
  }

  .msg.ai {
    background: var(--ai-bg);
    color: #c8c8c8;
  }

  .msg .label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--muted);
  }

  .msg.user .label { color: var(--accent); }

  #input-area {
    border-top: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    background: var(--bg);
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 20px;
  }

  #input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.3; cursor: default; }

  #dl-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
    display: none;
  }

  #dl-bar-fill {
    height: 100%;
    background: var(--accent);
    opacity: 0.4;
    transition: width 0.3s ease;
  }

  .thinking {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="titlebar">
  <span class="title">AMONYAK AI</span>
  <div class="controls">
    <button id="btn-min"></button>
    <button id="btn-max"></button>
    <button id="btn-close"></button>
  </div>
</div>

<div id="app">
  <div id="download-screen">
    <div>
      <div class="logo">AmonyakAI</div>
      <div class="sub" style="margin-top:8px">Model yükleniyor</div>
    </div>

    <div id="progress-wrap">
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
      <div id="progress-info">
        <span id="progress-text">0 MB / 4661 MB</span>
        <span id="progress-pct">0%</span>
      </div>
    </div>

    <button id="download-btn">İndir</button>
    <div id="download-status">—</div>
  </div>

  <div id="chat-screen">
    <div id="dl-bar"><div id="dl-bar-fill"></div></div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="input" placeholder="Bir şey yaz..." rows="1"></textarea>
      <button id="send-btn">Gönder</button>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
