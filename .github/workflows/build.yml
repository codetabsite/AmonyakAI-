name: Build AmonyakAI

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Ollama
        run: |
          mkdir bin
          $url = (Invoke-WebRequest -Uri "https://api.github.com/repos/ollama/ollama/releases/latest" | ConvertFrom-Json).assets | Where-Object { $_.name -eq "ollama-windows-amd64.exe" } | Select-Object -ExpandProperty browser_download_url
          Invoke-WebRequest -Uri $url -OutFile "bin/ollama.exe"

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Ollama
        run: |
          mkdir -p bin
          OLLAMA_URL=$(curl -s https://api.github.com/repos/ollama/ollama/releases/latest | grep -o '"browser_download_url": "[^"]*ollama-linux-amd64"' | cut -d'"' -f4)
          curl -L "$OLLAMA_URL" -o bin/ollama
          chmod +x bin/ollama

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
